<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link />
    <title>Calculator</title>
  </head>
  <body>
    <main class="calculator">
      <section class="display" id="display">0</section>

      <section class="buttons">
        <button class="btn" data-value="7">7</button>
        <button class="btn" data-value="8">8</button>
        <button class="btn" data-value="9">9</button>
        <button class="btn del" data-action="delete">DEL</button>

        <button class="btn" data-value="4">4</button>
        <button class="btn" data-value="5">5</button>
        <button class="btn" data-value="6">6</button>
        <button class="btn operator" data-operator="+">+</button>

        <button class="btn" data-value="1">1</button>
        <button class="btn" data-value="2">2</button>
        <button class="btn" data-value="3">3</button>
        <button class="btn operator" data-operator="-">-</button>

        <button class="btn" data-value="point">.</button>
        <button class="btn" data-value="0">0</button>
        <button class="btn operator" data-operator="/">/</button>
        <button class="btn operator" data-operator="*">*</button>

        <button class="btn reset" data-action="reset">RESET</button>
        <button class="btn equal" data-action="equal">=</button>
      </section>
    </main>
  </body>
</html>
